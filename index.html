<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM SKY | Professional AI</title>
    <style>
        body { background-color: #f0eee9; color: #4a4a4a; font-family: serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 40px; background: #ffffff; width: 90%; max-width: 500px; border-top: 5px solid #e6d5b8; }
        h1 { font-size: 2rem; letter-spacing: 5px; color: #c5a059; text-transform: uppercase; }
        
        /* 新增：輸入框樣式 */
        .input-group { margin: 20px 0; }
        input { width: 80%; padding: 12px; border: 1px solid #e6d5b8; background: #fdfcfb; outline: none; margin-bottom: 10px; }
        
        #display-area { width: 100%; height: 400px; background: #fdfcfb; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; }
        img { max-width: 100%; max-height: 100%; object-fit: cover; }
        
        .btn { background: #e6d5b8; color: #5a4d3a; border: none; padding: 15px 30px; cursor: pointer; transition: 0.4s; width: 100%; font-weight: bold; }
        .btn:hover { background: #c5a059; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DREAM SKY</h1>
        <div class="input-group">
            <input type="text" id="user-prompt" placeholder="描述你想要的時尚風格...">
        </div>
        <div id="display-area">
            <img id="fashion-img" src="https://picsum.photos/800/1200?fashion=1">
        </div>
        <br>
        <button class="btn" onclick="generate()">立即生成 / 換一張</button>
    </div>

    <script>
        function generate() {
            const prompt = document.getElementById('user-prompt').value;
            const img = document.getElementById('fashion-img');
            
            // 模擬處理中
            img.style.opacity = '0.3';
            
            // 這裡未來可以對接 OpenAI 或 Stable Diffusion API
            setTimeout(() => {
                img.src = "https://picsum.photos/800/1200?random=" + Math.random();
                img.onload = () => { img.style.opacity = '1'; };
                if(prompt) alert("已收到指令：" + prompt + "，正在為您生成...");
            }, 500);
        }
    </script>
</body>
</html>
