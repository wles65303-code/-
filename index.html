<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM SKY | AI Creative</title>
    <style>
        body { background-color: #f0eee9; color: #4a4a4a; font-family: serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 30px; background: #ffffff; width: 90%; max-width: 500px; border-top: 5px solid #c5a059; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.8rem; letter-spacing: 5px; color: #c5a059; text-transform: uppercase; margin-bottom: 20px; }
        input { width: 85%; padding: 12px; border: 1px solid #e6d5b8; margin-bottom: 15px; background: #fdfcfb; }
        #display-area { width: 100%; height: 400px; background: #fafafa; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; position: relative; }
        img { max-width: 100%; max-height: 100%; display: none; }
        .loading-text { display: none; color: #c5a059; font-style: italic; }
        .btn { background: #c5a059; color: white; border: none; padding: 15px 30px; cursor: pointer; width: 100%; font-weight: bold; letter-spacing: 2px; }
        .btn:disabled { background: #e6d5b8; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DREAM SKY</h1>
        <input type="text" id="promptInput" placeholder="輸入時尚指令 (例如: Cyberpunk fashion gold)...">
        <div id="display-area">
            <p id="loadingText" class="loading-text">AI 正在構思您的夢幻畫面...</p>
            <img id="resultImage" src="" alt="AI Result">
        </div>
        <button class="btn" id="genBtn" onclick="generateAI()">啟動 AI 生成</button>
    </div>

    <script>
        async function generateAI() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return alert("請輸入描述！");

            const btn = document.getElementById('genBtn');
            const img = document.getElementById('resultImage');
            const loading = document.getElementById('loadingText');

            // 狀態切換
            btn.disabled = true;
            btn.innerText = "生成中...";
            img.style.display = "none";
            loading.style.display = "block";

            try {
                // 這裡使用的是 Hugging Face 的免費模型接口 (Flux 或 Stable Diffusion)
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
                    {
                        headers: { Authorization: "Bearer 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" }, // 這裡需要填入你的 Token
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );
                
                const blob = await response.blob();
                img.src = URL.createObjectURL(blob);
                img.style.display = "block";
                loading.style.display = "none";
            } catch (e) {
                alert("AI 忙碌中，請稍後再試！");
            } finally {
                btn.disabled = false;
                btn.innerText = "啟動 AI 生成";
            }
        }
    </script>
</body>
</html>
